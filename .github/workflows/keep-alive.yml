name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜日 10:00 JST (01:00 UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent project pause
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://zktnhqpdybdhhrrrgcyg.supabase.co/rest/v1/" \
            -H "apikey: sb_publishable_dlfTNaH4qzOf_J2WCA6PYQ_80AnKxHy" \
            -H "Authorization: Bearer sb_publishable_dlfTNaH4qzOf_J2WCA6PYQ_80AnKxHy")
          echo "Supabase response: HTTP $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "OK — project is active"
          else
            echo "WARNING — unexpected status $STATUS (project may be paused)"
            exit 1
          fi
