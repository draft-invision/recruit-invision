<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | インビジョン 採用管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .app-title {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 32px;
    }
    .form-title {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 20px;
    }
    .input-group { margin-bottom: 14px; }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      color: #1e293b;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input::placeholder { color: #94a3b8; }
    input:focus { border-color: #6366f1; }
    .btn {
      width: 100%;
      padding: 15px;
      background: #1e1b4b;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn:hover { background: #312e81; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: #64748b;
      font-size: 14px;
    }
    .footer-text a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    .footer-text a:hover { text-decoration: underline; }
    .msg {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    .msg.error  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-title">インビジョン 採用管理</div>

    <!-- ログインフォーム -->
    <div id="login-section">
      <div class="form-title">ログイン</div>
      <div class="msg error" id="login-error"></div>
      <form id="login-form">
        <div class="input-group">
          <input type="email" id="login-email" placeholder="メールアドレス" required autocomplete="email">
        </div>
        <div class="input-group">
          <input type="password" id="login-password" placeholder="パスワード" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="login-btn">ログイン</button>
      </form>
      <p class="footer-text">アカウントがない？ <a onclick="showSection('register')">登録する</a></p>
    </div>

    <!-- 登録フォーム -->
    <div id="register-section" style="display:none">
      <div class="form-title">アカウント登録</div>
      <div class="msg error"   id="register-error"></div>
      <div class="msg success" id="register-success"></div>
      <form id="register-form">
        <div class="input-group">
          <input type="email" id="reg-email" placeholder="メールアドレス" required autocomplete="email">
        </div>
        <div class="input-group">
          <input type="password" id="reg-password" placeholder="パスワード（8文字以上）" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="register-btn">登録する</button>
      </form>
      <p class="footer-text">すでにアカウントがある？ <a onclick="showSection('login')">ログイン</a></p>
    </div>
  </div>

  <script>
    const sb = supabase.createClient(
      'https://zktnhqpdybdhhrrrgcyg.supabase.co',
      'sb_publishable_dlfTNaH4qzOf_J2WCA6PYQ_80AnKxHy'
    );

    function showSection(name) {
      document.getElementById('login-section').style.display    = name === 'login'    ? '' : 'none';
      document.getElementById('register-section').style.display = name === 'register' ? '' : 'none';
    }

    function showMsg(id, text, type) {
      var el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    function hideMsg(id) { document.getElementById(id).style.display = 'none'; }

    // ログイン済みならアプリへ
    sb.auth.getSession().then(function(res) {
      if (res.data.session) window.location.href = './';
    });

    // ログイン処理
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideMsg('login-error');
      var btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'ログイン中...';

      var email    = document.getElementById('login-email').value;
      var password = document.getElementById('login-password').value;

      var res = await sb.auth.signInWithPassword({ email: email, password: password });
      if (res.error) {
        showMsg('login-error', 'メールアドレスまたはパスワードが正しくありません。', 'error');
        btn.disabled = false; btn.textContent = 'ログイン';
      } else {
        window.location.href = './';
      }
    });

    // 登録処理
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideMsg('register-error');
      hideMsg('register-success');
      var btn = document.getElementById('register-btn');
      btn.disabled = true; btn.textContent = '登録中...';

      var email    = document.getElementById('reg-email').value;
      var password = document.getElementById('reg-password').value;

      var res = await sb.auth.signUp({ email: email, password: password });
      if (res.error) {
        showMsg('register-error', res.error.message, 'error');
        btn.disabled = false; btn.textContent = '登録する';
      } else {
        document.getElementById('register-form').style.display = 'none';
        showMsg('register-success', '登録完了！「ログイン」からメールアドレスとパスワードでログインしてください。', 'success');
      }
    });
  </script>
</body>
</html>
